  <title>Rose Gold - Mercy Skin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: #eee;
      background: url('https://imgur.com/jRcSpQ6.png') no-repeat center center fixed;
      background-size: cover;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .main-skin {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  gap: 1rem; /* Espacio entre la tarjeta y la navegación */
  padding: 2rem;
    }

    .nft {
      user-select: none;
      width: 90%;
      max-width: 800px;
      border: 1px solid #ffffff22;
      box-shadow: 0 7px 20px 5px #00000088;
      border-radius: .7rem;
 background: rgba(255, 255, 255, 0.1); /* Fondo semi-transparente */
  backdrop-filter: blur(10px); /* Este es el blur que aplica a lo de atrás */
  -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      text-align: center;
      padding: 2rem;
    }
.nft-content {
  display: flex;
  align-items: stretch;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.nft-img {
 width: 250px;
    height: auto;
  border-radius: 0.6rem;
  object-fit: cover;
  flex-shrink: 0;
  align-self: stretch; 
}

.nft-text {
 flex: 1;
  display: grid;
  place-content: center;
  text-align: center;
}

    h1 {
      font-size: 2.2rem;
      margin: 0 0 1rem;
    }

    p {
      font-size: 1.1rem;
      color: #e7e8d2;
    }

.nav-buttons a {
  text-decoration: none;
  transition: all 0.3s ease;
}

.nav-buttons a span {
  display: inline-block;
  font-size: 2rem;
  font-weight: bold;
  color: #eee;
  padding: 0.5rem;
  transition: transform 0.3s ease;
}

.nav-buttons a:hover span {
  transform: scale(1.2);
  color: #fff;
}


    .subpages {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      padding: 2rem;
    }

    .sub-card {
      width: 200px;
      border-radius: .5rem;
      overflow: hidden;
      background-color: #1e1e2f;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .sub-card:hover {
      transform: scale(1.05);
    }

    .sub-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .sub-card h2 {
      margin: 0;
      padding: 1rem;
      font-size: 1.1rem;
      text-align: center;
      color: #fff;
    }
 .external-links {
    position: fixed;
    top: 1rem;
    right: 1rem;
    display: flex;
    gap: 0.8rem;
    z-index: 10;
  }

  .external-links a {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    padding: 0.6rem 1rem;
    font-size: 0.9rem;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 0.5rem;
    text-decoration: none;
    backdrop-filter: blur(6px);
    transition: all 0.3s ease;
  }

  .external-links a:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.05);
  }
  </style>
